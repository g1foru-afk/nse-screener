name: Daily NSE Pre-Market Watchlist

on:
  schedule:
    # 02:15 UTC = 07:45 IST, gives ~1hr buffer before 9:00 AM IST.
    # GitHub's scheduled cron is best-effort and can run a few (sometimes
    # many) minutes late during high load — if you need a hard 9:00 AM
    # guarantee, run this on your own machine/VM via cron/Task Scheduler
    # instead (nse_eod_screener.py + daily_run.py work identically there).
    - cron: '15 2 * * 1-5'   # Mon-Fri
  workflow_dispatch: {}       # allows manual "Run workflow" button for testing

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily screener + news validation + dashboard build
        run: python daily_run.py --days 45 --final-top 10 --shortlist-top 15
        # If NSE starts blocking GitHub's IPs, the first thing to try is
        # switching to the httpx/server=True mode (pip install nse[server])
        # -- see README for details. If that still fails, this job needs
        # to move to a machine with a residential/non-datacenter IP.

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html watchlist_final.csv
          git diff --staged --quiet || git commit -m "Daily watchlist update $(date -u +%Y-%m-%d)"
          git push
