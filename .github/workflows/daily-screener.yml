name: Daily NSE Pre-Market Watchlist

on:
  # Schedule disabled: GitHub-hosted runners are IP-blocked by NSE
  # (confirmed via live run, matches upstream issue #9 in the nse
  # package repo). This job now runs locally via Windows Task Scheduler
  # -- see run_daily.bat and the "Windows Task Scheduler setup" section
  # in README.md. workflow_dispatch is left enabled only in case you
  # ever move this to a self-hosted runner or non-blocked cloud host.
  # - cron: '15 2 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily screener + news validation + dashboard build
        run: python daily_run.py --days 45 --final-top 10 --shortlist-top 15
        # If NSE starts blocking GitHub's IPs, the first thing to try is
        # switching to the httpx/server=True mode (pip install nse[server])
        # -- see README for details. If that still fails, this job needs
        # to move to a machine with a residential/non-datacenter IP.

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html watchlist_final.csv
          git diff --staged --quiet || git commit -m "Daily watchlist update $(date -u +%Y-%m-%d)"
          git push
